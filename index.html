<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(-45deg,#000,#220000,#550000,#000);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:360px;
padding:30px;
background:rgba(20,20,20,.9);
border:2px solid red;
border-radius:20px;
text-align:center;
box-shadow:0 0 30px red;
}

.card img{
width:140px;
height:140px;
border-radius:50%;
border:4px solid red;
object-fit:cover;
margin-bottom:15px;
}

h1{
color:red;
margin-bottom:10px;
}

p{
color:#ddd;
margin-bottom:20px;
}

.button{
display:block;
margin:12px 0;
padding:14px;
background:red;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
transition:.3s;
}

.button:hover{
background:white;
color:red;
transform:scale(1.05);
}

.button i{
margin-right:10px;
}

.footer{
margin-top:20px;
color:#aaa;
font-size:13px;
}
</style>

</head>

<body>
